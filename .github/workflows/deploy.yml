name: Deploy to GitHub Pages

# Builds the static site and publishes it to GitHub Pages. Nomima is free: visitors
# request a download by submitting their email (Mailchimp), and a Make.com automation
# emails them a welcome note + a tokenized link to download.html. No access codes.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs for the same ref.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble the published site (exclude repo meta)
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.claude' \
            --exclude='server-lock' \
            --exclude='node_modules' \
            --exclude='*.md' \
            --exclude='_site' \
            ./ _site/
          # Disable Jekyll processing on the served site.
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
