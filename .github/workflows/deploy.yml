name: Deploy to GitHub Pages

# Builds the static site and publishes it to GitHub Pages. Nomima is free: visitors
# request a download by submitting their email (Mailchimp), and a Make.com automation
# emails them a welcome note + a tokenized link to download.html. No access codes.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs for the same ref.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble the published site (exclude repo meta)
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.claude' \
            --exclude='server-lock' \
            --exclude='node_modules' \
            --exclude='*.md' \
            --exclude='_site' \
            ./ _site/
          # Disable Jekyll processing on the served site.
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Deploy the LIVE Cloudflare Worker (cf/worker.js) — the real nomima.io: the
  # static site (ASSETS binding) + the download/access/admin backend. GitHub
  # Pages above is only a static mirror and lacks the backend + /admin. This is
  # what keeps /admin online release-to-release (see RELEASING.md).
  #
  # No-ops with a warning until the repo secret CLOUDFLARE_API_TOKEN is set
  # (scopes: Workers Scripts:Edit + the account's Workers/D1 perms), so it never
  # fails CI before the token exists; once set, every push to main deploys.
  deploy-worker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: wrangler deploy (Cloudflare Worker)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::warning::CLOUDFLARE_API_TOKEN not set — skipping live Worker deploy. Run 'wrangler deploy' manually (see RELEASING.md) or add the secret to automate."
            exit 0
          fi
          npx --yes wrangler@4 deploy
